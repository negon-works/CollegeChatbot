{% extends 'staffpanel/base.html' %}

{% block title %}Delete Entry | Staff Panel{% endblock %}
{% block page_title %}Delete Bot Entry{% endblock %}

{% block content %}
<section class="panel-card full">
    <h3>Delete "{{ entry.intent }}"?</h3>
    <p>This will permanently remove the entry and its triggers.</p>
    <form method="post" class="form-actions">
        {% csrf_token %}
        <button type="submit" class="danger-btn">Yes, Delete</button>
        <a class="btn-link secondary-btn" href="{% url 'staffpanel:bot_content' %}">Cancel</a>
    </form>
</section>
{% endblock %}
